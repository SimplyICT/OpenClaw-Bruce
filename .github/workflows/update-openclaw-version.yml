name: Update OpenClaw Version

on:
  schedule:
    - cron: '0 9 * * 1'  # Every Monday at 9am UTC
  workflow_dispatch:      # Allow manual trigger

jobs:
  update-openclaw:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - name: Get latest openclaw release
        id: latest
        run: |
          LATEST=$(curl -s https://api.github.com/repos/openclaw/openclaw/releases/latest | jq -r '.tag_name')
          echo "tag=$LATEST" >> $GITHUB_OUTPUT

      - name: Get current version from Dockerfile
        id: current
        run: |
          CURRENT=$(grep 'ARG OPENCLAW_GIT_REF=' Dockerfile | sed 's/ARG OPENCLAW_GIT_REF=//')
          echo "tag=$CURRENT" >> $GITHUB_OUTPUT

      - name: Update Dockerfile
        if: steps.latest.outputs.tag != steps.current.outputs.tag
        run: |
          sed -i 's/ARG OPENCLAW_GIT_REF=.*/ARG OPENCLAW_GIT_REF=${{ steps.latest.outputs.tag }}/' Dockerfile

      - name: Create Pull Request
        if: steps.latest.outputs.tag != steps.current.outputs.tag
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: bump openclaw to ${{ steps.latest.outputs.tag }}"
          branch: "chore/openclaw-${{ steps.latest.outputs.tag }}"
          title: "chore: bump openclaw to ${{ steps.latest.outputs.tag }}"
          body: |
            Automated weekly check found a new OpenClaw release.

            - **Previous version:** `${{ steps.current.outputs.tag }}`
            - **New version:** `${{ steps.latest.outputs.tag }}`

            [Release notes](https://github.com/openclaw/openclaw/releases/tag/${{ steps.latest.outputs.tag }})

            > Merge this PR to trigger a Railway redeploy with the new version.
          delete-branch: true
